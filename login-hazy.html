<!DOCTYPE html>
<html lang="en" class="bg-background">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Log in or create your Smart Study Planner account." />
    <title>Log in or Register — Smart Study Planner</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">

  </head>
  <body>
    <!-- Interactive Background Effects -->
    <div class="bg-decorations">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>
    <!-- Navigation Header -->
    <header class="navbar">
      <div class="container">
        <a href="index.html" class="brand">
        <span class="brand-mark">
        <i class="fa-solid fa-graduation-cap"></i>
        </span>
          <span class="brand-text">Smart Study Planner</span>
        </a>
        <nav class="nav-actions">
          <a href="index.html" class="btn btn-ghost btn-sm">
            <i class="fa-solid fa-arrow-left"></i> Back to home
          </a>
        </nav>
      </div>
    </header>
    <!-- Main Authentication Box -->
    <main class="auth-wrap">
      <div class="auth-card">
        <h1 id="auth-title">Welcome back</h1>
        <p class="sub" id="auth-sub">Log in to access your study dashboard.</p>
        <!-- Tabs Switcher -->
        <div class="tabs" role="tablist">
          <button type="button" class="tab active" id="tab-login" role="tab">
            <i class="fa-solid fa-right-to-bracket"></i> Log in
          </button>
          <button type="button" class="tab" id="tab-register" role="tab">
            <i class="fa-solid fa-user-plus"></i> Register
          </button>
        </div>
        <!-- Form Error Banner -->
        <div class="form-error" id="error"></div>
        <!-- Login form -->
        <form id="login-form">
          <div class="field">
            <label for="login-email">Email</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-envelope field-icon"></i>
              <input class="input" type="email" id="login-email" autocomplete="email" placeholder="name@example.com" required />
            </div>
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock field-icon"></i>
              <input
                class="input"
                type="password"
                id="login-password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Log in <i class="fa-solid fa-circle-arrow-right"></i>
          </button>
        </form>
        <!-- Register form -->
        <form id="register-form" class="hidden">
          <div class="field">
            <label for="reg-name">Full name</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-user field-icon"></i>
              <input class="input" type="text" id="reg-name" autocomplete="name" placeholder="John Doe" required />
            </div>
          </div>
          <div class="field">
            <label for="reg-email">Email</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-envelope field-icon"></i>
              <input class="input" type="email" id="reg-email" autocomplete="email" placeholder="name@example.com" required />
            </div>
          </div>
          <div class="field">
            <label for="reg-password">Password</label>
            <div class="input-wrapper">
              <i class="fa-solid fa-lock field-icon"></i>
              <input
                class="input"
                type="password"
                id="reg-password"
                autocomplete="new-password"
                placeholder="Minimum 6 characters"
                required
                minlength="6"
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block">
            Create account <i class="fa-solid fa-user-plus"></i>
          </button>
        </form>
        <!-- Authentication Footer Switch Hint -->
        <p class="auth-foot" id="switch-hint">
          New here? <a href="#register" id="switch-link">Create an account</a>
        </p>
      </div>
    </main>
    <!-- Script modules -->
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
